name: Bug report
description: Report a reproducible problem in n2n-memory
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include tool calls, project structure, and relevant `.mcp` file shape if safe.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: n2n-memory version
      placeholder: "1.2.1"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
